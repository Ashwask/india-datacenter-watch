name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate dataset
        run: python3 scripts/validate_dataset.py

      - name: Check web/data.js is in sync with the CSV
        run: |
          python3 web/build_data.py
          if ! git diff --quiet web/data.js; then
            echo "::error::web/data.js is out of date. Run 'python3 web/build_data.py' and commit the result."
            git --no-pager diff web/data.js | head -40
            exit 1
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Syntax-check JavaScript
        run: |
          node --check web/app.js
          node --check web/data.js
          node --check web/impact_data.js
